<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arda — Stay cool. Keep moving.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,800&display=swap" rel="stylesheet"/>
<script defer src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue:#1363C4;--yellow:#E7E988;--black:#0D0D0D;--white:#FFFFFF;--gray:#6b6b6b;--light:#F5F5F3;
    --r-sm:10px;--r-md:16px;--r-lg:24px;--r-pill:100px;
  }
  html{scroll-behavior:smooth}
  body{font-family:'Rethink Sans',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}
  footer{box-shadow:0 -15px 35px rgba(0,0,0,.05);position:relative;z-index:10}

  /* Ticker */
  .ticker-wrap{overflow:hidden;white-space:nowrap}
  .ticker-inner{display:inline-flex;animation:ticker 24s linear infinite}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  /* Easing presets — framerotion-inspired */
  :root{
    --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
    --ease-out-quart: cubic-bezier(0.165, 0.84, 0.44, 1);
    --ease-in-out-quart: cubic-bezier(0.77, 0, 0.175, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Nav link */
  .nav-link{position:relative;text-decoration:none;color:inherit;font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase}
  a{text-decoration:none}
  .nav-link::after{display:none}

  /* Buttons — square design system */
  .btn-primary{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--blue);color:#fff;
    font-family:'Rethink Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.07em;text-transform:uppercase;
    padding:13px 24px 13px 28px;border:none;cursor:pointer;border-radius:0;
    transition:background .4s var(--ease-out-quart);
  }
  .btn-primary:hover{background:#0f4fa0}
  .btn-primary .arrow{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:rgba(255,255,255,.18);border-radius:0;transition:transform .5s var(--ease-out-expo)}
  .btn-primary:hover .arrow{transform:translateX(4px)}

  .btn-outline{
    display:inline-flex;align-items:center;gap:8px;
    background:transparent;color:var(--black);
    font-family:'Rethink Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.07em;text-transform:uppercase;
    padding:12px 24px;border:1.5px solid currentColor;cursor:pointer;border-radius:0;
    transition:all .45s var(--ease-out-quart);position:relative;overflow:hidden;
  }
  .btn-outline::before{content:'';position:absolute;inset:0;background:var(--black);transform:scaleX(0);transform-origin:left;transition:transform .5s var(--ease-out-expo);border-radius:0}
  .btn-outline:hover{color:#fff;border-color:var(--black)}
  .btn-outline:hover::before{transform:scaleX(1)}
  .btn-outline span{position:relative;z-index:1}

  .btn-white{
    display:inline-flex;align-items:center;gap:10px;
    background:#fff;color:var(--black);
    font-family:'Rethink Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.07em;text-transform:uppercase;
    padding:13px 24px 13px 28px;border:none;cursor:pointer;border-radius:0;
    transition:all .4s var(--ease-out-quart);
  }
  .btn-white:hover{background:var(--yellow)}
  .btn-white:active{transform:translateY(0)}

  /* Product cards */
  .product-card{cursor:pointer;overflow:hidden;position:relative;border-radius:0}
  .product-card img{transition:transform .8s var(--ease-out-expo);display:block;width:100%;height:100%;object-fit:cover}
  .product-card:hover img{transform:scale(1.06)}
  .product-card .overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(13,13,13,.6) 0%, transparent 55%);opacity:0;transition:opacity .5s var(--ease-out-quart);border-radius:0}
  .product-card:hover .overlay{opacity:1}
  .product-card .card-cta{position:absolute;bottom:20px;left:20px;right:20px;transform:translateY(12px);opacity:0;transition:all .5s var(--ease-out-expo)}
  .product-card:hover .card-cta{transform:translateY(0);opacity:1}

  /* Pill tag */
  .tag-pill{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:0}

  /* Size buttons */
  .size-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1.5px solid #d4d4d4;border-radius:0;font-family:'Rethink Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;background:#fff}
  .size-btn:hover,.size-btn.active{border-color:var(--black);background:var(--black);color:#fff}
  .size-btn.unavailable{opacity:.3;cursor:not-allowed;text-decoration:line-through}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(13,13,13,.58);z-index:1000;backdrop-filter:blur(2px);animation:fadeIn .4s var(--ease-out-quart)}
  .modal-panel{position:fixed;right:24px;top:24px;bottom:24px;width:min(480px,calc(100vw - 48px));background:var(--white);z-index:1001;animation:slideIn .5s var(--ease-out-expo);border-radius:0;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.25)}
  .modal-scroll{height:100%;overflow-y:auto;padding:0}
  .modal-scroll::-webkit-scrollbar{width:8px}
  .modal-scroll::-webkit-scrollbar-track{background:transparent}
  .modal-scroll::-webkit-scrollbar-thumb{background:#d8d8d8;border-radius:0}
  .modal-scroll::-webkit-scrollbar-thumb:hover{background:#bbb}
  .carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:0;background:#fff;border:none;cursor:pointer;z-index:5;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;transition:transform .3s var(--ease-out-quart)}
  .carousel-arrow:hover{transform:translateY(-50%) scale(1.1)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}

  /* Reveal — scale + fade, not just translateY */
  .reveal{opacity:0;transform:scale(.96) translateY(24px);transition:opacity .7s var(--ease-out-expo), transform .7s var(--ease-out-expo)}
  .reveal.visible{opacity:1;transform:scale(1) translateY(0)}

  /* Hotspot pins */
  .hotspot-pin{position:absolute;cursor:pointer;z-index:10}
  .hotspot-dot{width:14px;height:14px;background:#fff;border-radius:0;border:2px solid rgba(255,255,255,.5);position:relative;transition:transform .4s var(--ease-spring)}
  .hotspot-dot::after{content:'';position:absolute;inset:-6px;border-radius:0;border:1.5px solid rgba(255,255,255,.4);animation:pinPulse 2.4s ease-out infinite}
  .hotspot-pin:hover .hotspot-dot{transform:scale(1.35)}
  @keyframes pinPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}
  .hotspot-card{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:#fff;border-radius:0;padding:10px 14px;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.18);pointer-events:none;animation:cardPop .3s var(--ease-spring)}
  @keyframes cardPop{from{opacity:0;transform:translateX(-50%) scale(.92) translateY(6px)}to{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}}



  /* Tweaks */
  .tweaks-panel{position:fixed;bottom:24px;right:24px;background:#fff;border:1.5px solid #e8e8e8;padding:20px;width:280px;z-index:900;box-shadow:0 8px 32px rgba(0,0,0,.1);border-radius:0;display:none}
  .tweaks-panel.open{display:block;overflow-y:auto;max-height:90vh}
  .tweak-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-bottom:6px;display:block}
  .tweak-row{margin-bottom:14px}
  select.tweak-select{width:100%;padding:8px 10px;font-family:'Rethink Sans',sans-serif;font-size:13px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;outline:none;border-radius:0}

  /* Tweak toggle button */
  .tweak-toggle{position:fixed;bottom:24px;right:24px;width:48px;height:48px;background:#1363C4;border:none;border-radius:0;cursor:pointer;z-index:901;box-shadow:0 4px 16px rgba(19,99,196,.35);display:flex;align-items:center;justify-content:center;transition:transform .3s var(--ease-out-quart)}
  .tweak-toggle:hover{transform:scale(1.08)}
  .tweak-toggle svg{width:22px;height:22px;stroke:#fff;stroke-width:2.5;fill:none}
  
  /* Range input */
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#e8e8e8;border-radius:0;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#1363C4;border-radius:0;cursor:pointer;transition:transform .2s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}

  @media(max-width:768px){.hide-mobile{display:none!important}.modal-panel{width:calc(100vw - 32px);right:16px;top:16px;bottom:16px;border-radius:0}}
</style>

<script>
(function(){
  const el = document.getElementById('preloader');
  const fill = document.getElementById('preloader-fill');

  function easeOutQuart(t){ return 1 - Math.pow(1-t,4); }
  function easeInOutQuart(t){ return t<.5 ? 8*t*t*t*t : 1-Math.pow(-2*t+2,4)/2; }

  const fillDur = 900;
  const holdAfter = 280;
  const slideDur = 800;
  let fillStart = null;

  function animateFill(ts){
    if(!fillStart) fillStart = ts;
    const p = Math.min((ts - fillStart) / fillDur, 1);
    const e = easeOutQuart(p);
    fill.setAttribute('y', 275 - e*275);
    if(p < 1){ requestAnimationFrame(animateFill); }
    else {
      // hold, then slide the whole preloader up
      setTimeout(() => {
        let slideStart = null;
        function animateSlide(ts2){
          if(!slideStart) slideStart = ts2;
          const p2 = Math.min((ts2 - slideStart) / slideDur, 1);
          const e2 = easeInOutQuart(p2);
          el.style.transform = `translateY(-${e2*100}%)`;
          if(p2 < 1){ requestAnimationFrame(animateSlide); }
          else { el.style.display = 'none'; }
        }
        requestAnimationFrame(animateSlide);
      }, holdAfter);
    }
  }
  requestAnimationFrame(animateFill);
})();
</script>

/* ── Sticky Cards Stack ── */
const StickyScroll = ({ onProduct, cardGap = 24 }) => {
  const [prog, setProg] = React.useState(0);
  const containerRef = React.useRef();

  const cards = [
  { product: PRODUCTS[0], img: 'uploads/optimized/arda_lookbook_brown-set_studio-front.jpg' },
  { product: PRODUCTS[1], img: 'uploads/optimized/arda_lookbook_navy-set_street-crossing.jpg' },
  { product: PRODUCTS[2], img: 'uploads/optimized/arda_lookbook_lime-shorts_tennis-court.jpg' }];

  const N = cards.length;
  const slot = 1 / N;

  React.useEffect(() => {
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
      const el = containerRef.current;
      if (!el) {ticking = false;return;}
      const rect = el.getBoundingClientRect();
      const total = rect.height - window.innerHeight;
      const nextProg = Math.max(0, Math.min(1, -rect.top / total));
      setProg((prev) => Math.abs(prev - nextProg) > 0.002 ? nextProg : prev);
      ticking = false;
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const cardStyle = (i) => {
    const bury = i < N - 1 ? Math.max(0, Math.min(1, (prog - i * slot) / slot)) : 0;
    const slideIn = i === 0 ? 1 : Math.max(0, Math.min(1, (prog - (i - 1) * slot) / slot));
    const translateY = i === 0 ? 0 : `${(1 - slideIn) * (108 + cardGap * 0.3)}%`;
    const scale = 1 - bury * 0.08;
    const pushUp = bury * (4.2 + cardGap * 0.08);
    return {
      position: 'absolute', inset: 0,
      borderRadius: 0, overflow: 'hidden', cursor: 'pointer',
      zIndex: i + 1,
      transformOrigin: 'top center',
      transform: i === 0 ?
      `scale(${scale}) translateY(-${pushUp}%)` :
      `translateY(${translateY}) scale(${scale}) translateY(-${pushUp}%)`,
      willChange: 'transform'
    };
  };

  return (
    <div ref={containerRef} id="coleccion" style={{ height: `${N * 100 + 85 + cardGap * 0.5}vh`, position: 'relative' }}>
      <div style={{ position: 'sticky', top: 0, height: '100vh', padding: '80px 32px 48px', background: '#1363C4', overflow: 'hidden' }}>

        <div style={{ position: 'relative', width: '100%', height: '100%', maxWidth: 1300, margin: '0 auto' }}>
          {cards.map((card, i) =>
          <div key={i} style={cardStyle(i)} onClick={() => onProduct(card.product)}>
              <SmartImage src={card.img} alt={card.product.name}
            style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center top', display: 'block' }} />
              <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(13,13,13,.72) 0%, rgba(13,13,13,.0) 55%)', pointerEvents: 'none' }} />
              <div style={{ position: 'absolute', bottom: 36, left: 36, right: 36, display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
                <div>
                  {card.product.tag && <span className="tag-pill" style={{ background: card.product.tagColor, color: card.product.tagText, marginBottom: 10, display: 'inline-block' }}>{card.product.tag}</span>}
                  <div style={{ color: '#fff', fontWeight: 800, fontSize: 'clamp(24px,3vw,42px)', letterSpacing: '-.02em', lineHeight: 1 }}>{card.product.name}</div>
                  <div style={{ color: 'rgba(255,255,255,.65)', fontSize: 16, fontWeight: 600, marginTop: 8 }}>{card.product.price}</div>
                </div>
                <button className="btn-white" style={{ flexShrink: 0 }} onClick={(e) => {e.stopPropagation();onProduct(card.product);}}>

const ProductGrid = ({ onProduct, revealDelay = 80, revealDuration = 700, stagger = 80 }) => {
  const ref = useRef();
  useEffect(() => {
    const els = ref.current?.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {if (e.isIntersecting) {setTimeout(() => e.target.classList.add('visible'), revealDelay + i * stagger);}});
    }, { threshold: .1, rootMargin: '0px 0px -40px 0px' });
    els?.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  }, [revealDelay, stagger]);

  useEffect(() => {
    const style = document.getElementById('reveal-styles');
    if (!style) {
      const s = document.createElement('style');
      s.id = 'reveal-styles';
      s.textContent = `.reveal{opacity:0;transform:scale(.96) translateY(24px);transition:opacity ${revealDuration}ms var(--ease-out-expo), transform ${revealDuration}ms var(--ease-out-expo)}.reveal.visible{opacity:1;transform:scale(1) translateY(0)}`;

              <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tu@email.com"
              style={{ flex: 1, padding: '11px 16px', background: '#fff', border: 'none', color: '#0D0D0D', fontFamily: 'Rethink Sans', fontSize: 13, outline: 'none' }} />
              <button onClick={() => {if (email) {setSent(true);setEmail('');}}}
              style={{ padding: '0 24px', background: '#E7E988', border: 'none', color: '#0D0D0D', fontFamily: 'Rethink Sans', fontWeight: 700, fontSize: 12, letterSpacing: '.05em', textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap', transition: 'all .2s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onMouseEnter={(e) => e.currentTarget.style.background = '#fff'}
              onMouseLeave={(e) => e.currentTarget.style.background = '#E7E988'}>
                {sent ? '✓' : 'Suscribite'}
              </button>
            </div>
            <div style={{ display: 'flex', gap: 20, marginTop: 24 }}>
              {['Instagram', 'TikTok', 'Pinterest'].map((s) =>
              <a key={s} href="#" style={{ color: 'rgba(255,255,255,.55)', fontSize: 11, fontWeight: 700, letterSpacing: '.07em', textDecoration: 'none', transition: 'color .2s', textTransform: 'uppercase' }}
              onMouseEnter={(e) => e.target.style.color = '#fff'}
              onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,.55)'}>{s}</a>
              )}
            </div>
          </div>
          {[
          { t: 'Tienda', ls: ['Colección SS25', 'Sets', 'Tops', 'Outers', 'Sale'] },
          { t: 'Info', ls: ['Sobre Arda', 'Lookbook', 'Sustentabilidad', 'Blog'] },
          { t: 'Ayuda', ls: ['Guía de tallas', 'Envíos', 'Devoluciones', 'Contacto'] }].
          map((col) =>
          <div key={col.t}>
              <span style={{ color: 'rgba(255,255,255,.25)', fontSize: 10, fontWeight: 700, letterSpacing: '.13em', textTransform: 'uppercase', display: 'block', marginBottom: 16 }}>{col.t}</span>
              {col.ls.map((l) =>
            <a key={l} href="#" style={{ display: 'block', color: 'rgba(255,255,255,.65)', fontSize: 13, fontWeight: 500, textDecoration: 'none', marginBottom: 9, transition: 'color .2s' }}
            onMouseEnter={(e) => e.target.style.color = '#fff'}
            onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,.65)'}>{l}</a>
            )}
            </div>
          )}
        </div>
      </div>
      {/* Full-width logo pegado al bottom */}
      <div style={{ flexGrow: 1, position: 'relative', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
        <svg width="100%" viewBox="0 0 737 275" preserveAspectRatio="xMidYMax meet" style={{ display: 'block', width: '100%', height: 'auto', maxHeight: '100%' }}>

          <path d="M736.128 263.25C733.027 255.902 731.522 246.839 731.522 235.538V141.379C731.522 121.965 722.908 105.676 706.608 94.2836C690.124 82.7608 666.515 76.6699 638.338 76.6699C584.018 76.6699 550.72 99.1717 546.989 138.406C546.851 139.839 547.327 141.264 548.286 142.321C549.231 143.355 550.52 143.922 551.918 143.922H604.218C606.721 143.922 608.871 142.045 609.117 139.647C611.028 121.244 622.115 111.913 642.062 111.913C668.657 111.913 672.327 129.289 672.327 148.067V150.304C672.327 163.382 652.204 165.834 626.721 168.937C588.379 173.603 540.662 179.41 540.662 222.881C540.662 254.048 566.26 274.19 605.877 274.19C633.846 274.19 655.743 264.047 669.202 244.862L672.695 239.882V247.368C673.31 254.47 677.21 263.732 681.594 268.49C682.531 269.509 683.874 270.091 685.264 270.091H731.576C733.265 270.091 734.762 269.287 735.691 267.893C736.62 266.491 736.781 264.797 736.128 263.234V263.25ZM672.327 195.346C672.327 222.33 655.282 241.177 630.875 241.177C614.115 241.177 602.844 231.73 602.844 217.672C602.844 198.549 623.796 193.707 644.05 189.025C649.693 187.723 655.536 186.375 660.972 184.735C663.674 183.915 666.523 184.413 668.78 186.083C671.029 187.746 672.319 190.313 672.319 193.109V195.339L672.327 195.346Z" fill="#E7E988" />

        </svg>
      </div>
    </footer>);

};

/* ── Tweaks ── */
const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
  "heroLayout": "three-col",
  "heroImageY": 38,
  "gridStyle": "editorial",
  "accentColor": "#E7E988",
  "cardGap": 120,
  "heroAnimDuration": 1.3,
  "heroDelay1": 0.85,
  "heroDelay2": 1.05,
  "heroDelay3": 1.25
} /*EDITMODE-END*/;

const TweaksPanel = ({ open, heroLayout, setHeroLayout, heroImageY, setHeroImageY, cardGap, setCardGap, revealDelay, setRevealDelay, revealDuration, setRevealDuration, stagger, setStagger, heroAnimDuration, setHeroAnimDuration, heroDelay1, setHeroDelay1, heroDelay2, setHeroDelay2, heroDelay3, setHeroDelay3 }) => {
  const post = (edits) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  return (
    <div className={`tweaks-panel${open ? ' open' : ''}`}>
      <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.1em', textTransform: 'uppercase', display: 'block', marginBottom: 14 }}>Tweaks</span>
      <div className="tweak-row">
        <span className="tweak-label">Estilo Hero</span>
        <select className="tweak-select" value={heroLayout} onChange={(e) => {setHeroLayout(e.target.value);post({ heroLayout: e.target.value });}}>
          <option value="three-col">3 columnas (nuevo)</option>
          <option value="full-bleed">Full bleed foto</option>
          <option value="split">Split foto / texto</option>
          <option value="aurora">Aurora gradient</option>
        </select>
      </div>
      <div style={{ borderTop: '1px solid #eee', marginTop: 4, paddingTop: 12, marginBottom: 4 }}>
        <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '.1em', textTransform: 'uppercase', display: 'block', marginBottom: 12, color: '#1363C4' }}>Hero — Animación</span>
        <div className="tweak-row">
          <span className="tweak-label">Duración — {heroAnimDuration}s</span>
          <input type="range" min="0.4" max="3" step="0.1" value={heroAnimDuration}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setHeroAnimDuration(v);post({ heroAnimDuration: v });}} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}><span>Rápido</span><span>Lento</span></div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Col 1 delay — {heroDelay1}s</span>
          <input type="range" min="0" max="1.5" step="0.05" value={heroDelay1}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setHeroDelay1(v);post({ heroDelay1: v });}} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Col 2 delay — {heroDelay2}s</span>
          <input type="range" min="0" max="1.5" step="0.05" value={heroDelay2}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setHeroDelay2(v);post({ heroDelay2: v });}} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Col 3 delay — {heroDelay3}s</span>
          <input type="range" min="0" max="1.5" step="0.05" value={heroDelay3}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setHeroDelay3(v);post({ heroDelay3: v });}} />
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Posición imagen hero — {heroImageY}%</span>
        <input type="range" min="0" max="80" step="1" value={heroImageY}
        style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
        onChange={(e) => {const v = Number(e.target.value);setHeroImageY(v);post({ heroImageY: v });}} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}>
          <span>Arriba</span><span>Abajo</span>
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Gap entre cards — {cardGap}px</span>
        <input type="range" min="0" max="100" step="2" value={cardGap}
        style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
        onChange={(e) => {const v = Number(e.target.value);setCardGap(v);post({ cardGap: v });}} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}>
          <span>0px</span><span>100px</span>
        </div>
      </div>
      <div style={{ borderTop: '1px solid #eee', marginTop: 8, paddingTop: 12 }}>
        <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: '.1em', textTransform: 'uppercase', display: 'block', marginBottom: 12, color: '#1363C4' }}>Animation</span>
        <div className="tweak-row">
          <span className="tweak-label">Reveal Delay — {revealDelay}ms</span>
          <input type="range" min="0" max="300" step="10" value={revealDelay}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setRevealDelay(v);post({ revealDelay: v });}} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}>
            <span>0</span><span>300</span>
          </div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Reveal Duration — {revealDuration}ms</span>
          <input type="range" min="200" max="800" step="50" value={revealDuration}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setRevealDuration(v);post({ revealDuration: v });}} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}>
            <span>200</span><span>800</span>
          </div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Stagger — {stagger}ms</span>
          <input type="range" min="0" max="200" step="10" value={stagger}
          style={{ width: '100%', accentColor: '#1363C4', cursor: 'pointer' }}
          onChange={(e) => {const v = Number(e.target.value);setStagger(v);post({ stagger: v });}} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: '#aaa', marginTop: 2 }}>
            <span>0</span><span>200</span>
          </div>
        </div>
      </div>
    </div>);

};

/* ── App ── */
const App = () => {
  const [scrolled, setScrolled] = useState(false);
  const [product, setProduct] = useState(null);
  const [cart, setCart] = useState(0);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [heroLayout, setHeroLayout] = useState(TWEAK_DEFAULS.heroLayout);
  const [heroImageY, setHeroImageY] = useState(TWEAK_DEFAULS.heroImageY);
  const [cardGap, setCardGap] = useState(TWEAK_DEFAULS.cardGap);
  const [heroAnimDuration, setHeroAnimDuration] = useState(TWEAK_DEFAULS.heroAnimDuration);
  const [heroDelay1, setHeroDelay1] = useState(TWEAK_DEFAULS.heroDelay1);
  const [heroDelay2, setHeroDelay2] = useState(TWEAK_DEFAULS.heroDelay2);
  const [heroDelay3, setHeroDelay3] = useState(TWEAK_DEFAULS.heroDelay3);
  const [revealDelay, setRevealDelay] = useState(80);
  const [revealDuration, setRevealDuration] = useState(700);
  const [stagger, setStagger] = useState(80);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  useEffect(() => {
    setTweaksOpen(false);
  }, []);

  const toShop = () => {const el = document.getElementById('coleccion');if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });};
  const tickerItems = ['Stay cool. Keep moving.', 'Activewear femenino', 'Hecho en Chile', 'SS 2025', 'Carácter + Versatilidad', 'Envío gratis sobre $60k'];

  return (
    <>
      {/* Wrapper con marginBottom de 100svh para revelar el footer de abajo */}
      <div style={{ position: 'relative', zIndex: 1, background: '#fff', marginBottom: '100svh' }}>
        <Nav cartCount={cart} scrolled={scrolled} onCartOpen={() => {}} />
        <Hero onShop={toShop} layout={heroLayout} imageY={heroImageY} animDuration={heroAnimDuration} delay1={heroDelay1} delay2={heroDelay2} delay3={heroDelay3} />
        <Ticker bg='#1363C4' textColor='#E7E988' items={tickerItems} speed={26} />
        <StickyScroll onProduct={setProduct} cardGap={cardGap} />
        <ProductGrid onProduct={setProduct} revealDelay={revealDelay} revealDuration={revealDuration} stagger={stagger} />
        <Ticker bg='#1363C4' textColor='rgba(255,255,255,.85)' items={tickerItems} speed={20} />
        <LifestyleBand onProduct={setProduct} />
        <EditorialFeature onProduct={setProduct} />
      </div>
      
      <Footer />
      <ProductModal product={product} onClose={() => setProduct(null)} onAddCart={() => setCart((c) => c + 1)} />
      <TweaksPanel open={tweaksOpen}
      heroLayout={heroLayout} setHeroLayout={setHeroLayout}
      heroImageY={heroImageY} setHeroImageY={setHeroImageY}
      cardGap={cardGap} setCardGap={setCardGap}
      revealDelay={revealDelay} setRevealDelay={setRevealDelay}
      revealDuration={revealDuration} setRevealDuration={setRevealDuration}
      stagger={stagger} setStagger={setStagger}
      heroAnimDuration={heroAnimDuration} setHeroAnimDuration={setHeroAnimDuration}
      heroDelay1={heroDelay1} setHeroDelay1={setHeroDelay1}
      heroDelay2={heroDelay2} setHeroDelay2={setHeroDelay2}
      heroDelay3={heroDelay3} setHeroDelay3={setHeroDelay3} />
    </>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
